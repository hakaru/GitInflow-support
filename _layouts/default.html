<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} - {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.min.css">
    <style>
      :root { --pico-font-size: 16px; }
      body { display: flex; min-height: 100vh; }
      aside { width: 280px; padding: 2rem; background: var(--pico-card-background-color); border-right: 1px solid var(--pico-muted-border-color); }
      aside .app-card { text-align: center; margin-bottom: 1.5rem; }
      aside .app-card img { width: 80px; border-radius: 18px; margin-bottom: 0.5rem; }
      aside nav ul { list-style: none; padding: 0; }
      aside nav ul li { margin-bottom: 0.25rem; }
      aside nav ul li a { text-decoration: none; }
      main { flex: 1; padding: 2rem; max-width: 800px; }
      footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--pico-muted-border-color); font-size: 0.85rem; color: var(--pico-muted-color); }
      @media (max-width: 768px) {
        body { flex-direction: column; }
        aside { width: 100%; border-right: none; border-bottom: 1px solid var(--pico-muted-border-color); }
      }
    </style>
    {% include analytics.html %}
  </head>
  <body>
    <aside>
      <div class="app-card">
        <img src="{{ '/assets/app-icon.png' | relative_url }}" alt="GitInflow">
        <h3><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h3>
        <p><small>GitHub Issue Kanban Client</small></p>
      </div>
      <nav>
        <ul>
          <li><strong>EN</strong></li>
          <li><a href="{{ '/' | relative_url }}">Support</a></li>
          <li><a href="{{ '/manual/en/' | relative_url }}">Manual</a></li>
          <li><a href="{{ '/changelog' | relative_url }}">Changelog</a></li>
          <li><a href="{{ '/privacy' | relative_url }}">Privacy Policy</a></li>
          <li><a href="{{ '/blog/en/' | relative_url }}">Blog</a></li>
        </ul>
        <ul>
          <li><strong>JA</strong></li>
          <li><a href="{{ '/index-ja' | relative_url }}">サポート</a></li>
          <li><a href="{{ '/manual/ja/' | relative_url }}">マニュアル</a></li>
          <li><a href="{{ '/changelog-ja' | relative_url }}">更新履歴</a></li>
          <li><a href="{{ '/privacy-ja' | relative_url }}">プライバシーポリシー</a></li>
          <li><a href="{{ '/blog/ja/' | relative_url }}">ブログ</a></li>
        </ul>
      </nav>
      <hr>
      <p><small><a href="https://github.com/hakaru">hakaru apps</a></small></p>
    </aside>
    <main>
      {{ content }}
      <footer>
        <p>&copy; 2026 GitInflow. All rights reserved.</p>
      </footer>
    </main>
  </body>
</html>
